<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Your profile · Supernova Arcade</title>
<meta name="description" content="Your Supernova Arcade passport: your arcade points across every game, your rank, and your name, all read straight from the chain." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Your profile · Supernova Arcade" />
<meta property="og:description" content="One passport across every game. Your arcade points, your rank, all onchain." />
<meta property="og:image" content="https://supernova-arcade.xyz/supernova-arcade-og.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://supernova-arcade.xyz/supernova-arcade-og.png" />
<link rel="icon" href="/favicon.svg" />
<link rel="stylesheet" href="/arcade-shell.css" />
<!--
  /me — the player profile. Presentation only; reads the passport (address +
  handle) and the SAME onchain point sources the hub Leaderboard aggregates, so
  the total here matches the board exactly. No onchain logic, no key grinding
  (read-only queries). Identity = passport.js. Points model = the hub board's
  (cumulative arcade points). Per-game points come from the board's sources;
  the getTopPoints accumulators read 0 until that contract upgrade ships (same
  as the board). House rules: solid headlines, glow earned (the total only),
  onchain one word, US English, no em dashes.
-->
<style>
  body{ --c:#23F7DD; }
  .wrap{ max-width:620px; }
  .ptag{ font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--c);
    background:color-mix(in srgb,var(--c) 13%,transparent);border:1px solid color-mix(in srgb,var(--c) 30%,transparent);padding:4px 9px;border-radius:999px; }
  @media(max-width:430px){ .ptag{ display:none; } }

  /* ===== the arcade passport — the splendor centerpiece ===== */
  .passport{ position:relative;overflow:hidden;border-radius:22px;margin-bottom:20px;
    background:radial-gradient(130% 120% at 82% -12%,color-mix(in srgb,var(--c) 16%,transparent),transparent 52%),linear-gradient(162deg,#0f1422,#0a0e15 58%,#080a10);
    border:1px solid color-mix(in srgb,var(--c) 34%,#232936);
    box-shadow:0 0 40px color-mix(in srgb,var(--c) 16%,transparent),0 26px 54px rgba(0,0,0,.52),inset 0 1px 0 rgba(255,255,255,.06); }
  .passport::after{ content:"";position:absolute;inset:0;pointer-events:none;z-index:2;opacity:.32;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 3px,rgba(0,0,0,.22) 3px 4px); }
  .passport::before{ content:"";position:absolute;inset:0;pointer-events:none;z-index:2;background:linear-gradient(122deg,rgba(255,255,255,.08),transparent 34%); }
  .pb-brk{ position:absolute;width:18px;height:18px;border:2px solid color-mix(in srgb,var(--c) 50%,transparent);z-index:3;pointer-events:none; }
  .pb-brk.tl{ top:13px;left:13px;border-right:none;border-bottom:none;border-radius:8px 0 0 0; }
  .pb-brk.tr{ top:13px;right:13px;border-left:none;border-bottom:none;border-radius:0 8px 0 0; }
  .pb-brk.bl{ bottom:13px;left:13px;border-right:none;border-top:none;border-radius:0 0 0 8px; }
  .pb-brk.br{ bottom:13px;right:13px;border-left:none;border-top:none;border-radius:0 0 8px 0; }
  .pb-marq{ position:relative;z-index:1;text-align:center;font-family:var(--mono);font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--c);padding:17px 0 2px;text-shadow:0 0 10px color-mix(in srgb,var(--c) 55%,transparent); }
  .pb-marq .strip{ position:absolute;top:9px;left:50%;transform:translateX(-50%);width:min(56%,190px);height:5px;background-image:radial-gradient(circle,var(--c) 1.2px,transparent 1.7px);background-size:14px 5px;background-repeat:repeat-x;filter:drop-shadow(0 0 4px var(--c));opacity:.68; }
  .pb-id{ position:relative;z-index:1;display:flex;align-items:center;gap:16px;padding:10px 22px 6px; }
  .pb-ico{ flex:0 0 auto;width:72px;height:72px;border-radius:16px;padding:9px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:2.5px;
    background:#080b12;border:1px solid color-mix(in srgb,var(--c) 42%,transparent);box-shadow:0 0 18px color-mix(in srgb,var(--c) 26%,transparent),inset 0 0 14px rgba(0,0,0,.6); }
  .pb-ico i{ border-radius:2px;background:#10151e; }
  .pb-ico i.on{ background:var(--c);box-shadow:0 0 6px color-mix(in srgb,var(--c) 75%,transparent); }
  .pb-idt{ min-width:0; }
  .pb-name{ font-size:clamp(26px,7vw,34px);font-weight:900;letter-spacing:-.02em;line-height:1.02;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .pb-addr{ margin-top:5px;font-family:var(--mono);font-size:11.5px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis; }
  .pb-addr .set{ color:var(--c); }
  .pb-stat{ position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:space-between;gap:10px 16px;flex-wrap:wrap;padding:12px 22px 20px;margin-top:8px;border-top:1px solid rgba(255,255,255,.07); }
  .pb-total .lbl{ font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint); }
  .pb-total .v{ font-family:var(--mono);font-weight:800;font-variant-numeric:tabular-nums;font-size:clamp(40px,12vw,56px);line-height:.9;color:var(--c);text-shadow:0 0 28px color-mix(in srgb,var(--c) 46%,transparent); }
  .pb-rank{ display:flex;align-items:center;gap:10px; }
  .pb-rank .medal{ width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-family:var(--mono);font-weight:800;font-size:14px;color:#04140f;background:var(--c);box-shadow:0 0 16px color-mix(in srgb,var(--c) 45%,transparent); }
  .pb-rank.r1 .medal{ background:#FFD23F;box-shadow:0 0 18px rgba(255,210,63,.5);color:#2a1f04; }
  .pb-rank.r2 .medal{ background:#cfd5e1;color:#1a1d22; }
  .pb-rank.r3 .medal{ background:#F5B544;color:#2a1f04; }
  .pb-rank.none .medal{ background:transparent;border:1px dashed color-mix(in srgb,var(--c) 40%,transparent);color:var(--c);box-shadow:none;font-size:18px; }
  .pb-rank .of{ font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-faint);line-height:1.4; }

  /* ===== per-game points as lit, themed mini-panels ===== */
  .pg-h{ font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin:22px 2px 12px; }
  .pg-grid{ display:grid;grid-template-columns:1fr 1fr;gap:11px; }
  .pg{ position:relative;overflow:hidden;border-radius:15px;padding:14px 15px 13px 18px;text-decoration:none;
    background:linear-gradient(160deg,color-mix(in srgb,var(--gc) 11%,transparent),rgba(11,14,20,.6) 72%);
    border:1px solid color-mix(in srgb,var(--gc) 26%,var(--border));transition:border-color .15s,transform .15s,box-shadow .15s; }
  .pg::before{ content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--gc);box-shadow:0 0 9px var(--gc); }
  .pg::after{ content:"";position:absolute;inset:0;pointer-events:none;opacity:.16;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 3px,rgba(0,0,0,.2) 3px 4px); }
  .pg:hover{ border-color:color-mix(in srgb,var(--gc) 55%,transparent);transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,.34); }
  .pg .gnm{ position:relative;z-index:1;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gc);margin-bottom:10px; }
  .pg .gv{ position:relative;z-index:1;display:flex;align-items:baseline;gap:5px; }
  .pg .gv .n{ font-family:var(--mono);font-weight:800;font-variant-numeric:tabular-nums;font-size:27px;line-height:1;color:var(--gc);text-shadow:0 0 14px color-mix(in srgb,var(--gc) 40%,transparent); }
  .pg .gv .u{ font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint); }
  .pg.zero .gv .n{ color:var(--text-faint);text-shadow:none; }
  .pg .go{ position:absolute;top:12px;right:13px;z-index:1;color:var(--gc);opacity:.5;font-size:14px;transition:transform .15s,opacity .15s; }
  .pg:hover .go{ opacity:1;transform:translateX(2px); }

  .me-empty{ border:1px solid var(--border);border-radius:18px;padding:26px 20px;text-align:center;background:rgba(14,17,23,.5); }
  .me-empty .t{ font-size:17px;font-weight:700;color:var(--text);margin-bottom:7px; }
  .me-empty .s{ font-size:13.5px;color:var(--text-dim);line-height:1.5;margin:0 auto 18px;max-width:34ch; }
  .cta-row{ display:flex;gap:10px;flex-wrap:wrap;justify-content:center; }
  .cta{ font-family:var(--mono);font-size:12.5px;letter-spacing:.03em;text-decoration:none;border-radius:11px;padding:12px 20px; }
  .cta.primary{ color:#04140f;background:var(--c);border-bottom:3px solid color-mix(in srgb,var(--c) 55%,black);box-shadow:0 0 18px color-mix(in srgb,var(--c) 28%,transparent); }
  .cta.ghost{ color:var(--text);border:1px solid var(--border);background:rgba(14,17,23,.6); }
  @media(max-width:440px){ .pg-grid{ grid-template-columns:1fr; } }
</style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<canvas id="galaxy" aria-hidden="true"></canvas>
<div class="scan"></div><div class="vignette"></div><div class="floor"></div>
<div class="brk tl"></div><div class="brk tr"></div><div class="brk bl"></div><div class="brk br"></div>
<div class="wrap">
  <header class="abar">
    <a class="back" href="/"><span aria-hidden="true">&larr;</span> Arcade</a>
    <span class="lockup"><img src="/mvx-wordmark.svg" alt="MultiversX" /><span class="ptag">Passport</span></span>
  </header>

  <div id="meView">
    <div class="me-empty"><div class="t">Reading your passport&hellip;</div><div class="s">One identity across every game, read straight from the chain.</div></div>
  </div>

  <footer class="afoot" style="margin-top:20px;"><span class="sn">Supernova · live on testnet</span> · one passport, every game · <a href="/">the Leaderboard</a></footer>
</div>

<script type="module">
  import { createArcadeClient, GAMES } from "/arcade-core.js";
  import { mountGalaxy } from "/arcade-galaxy.js";
  import { getAddress, getHandle, hasPassport } from "/passport.js";
  import { bech32 } from "https://esm.sh/@scure/base@1.1.6"; // same lib arcade-core uses, for address matching

  let galaxy = null;
  try { galaxy = mountGalaxy({ intensity: 0.5, canvas: "#galaxy", ambient: true }); } catch (e) {}

  // SAME point sources the hub Leaderboard aggregates → /me total matches the board.
  const SPRINT_LEADERBOARD = "erd1qqqqqqqqqqqqqpgqh9wpfl0mt337h68z8cuv6w6mkfucqv5tppuqsxz6sp";
  const SRC = [
    { game: "Tug of War",       view: "getTopPullers",  address: GAMES.tugofwar.contract, args: ["0a"], weight: 1, c: "#23F7DD", route: "/tug-of-war" },
    { game: "Supernova Canvas", view: "getTopPainters", address: GAMES.canvas.contract,   args: ["0a"], weight: 1, c: "#A78BFA", route: "/canvas" },
    { game: "Supernova Sprint", view: "getTopPoints",   address: SPRINT_LEADERBOARD,       args: [],     weight: 1, c: "#23F7DD", route: "/sprint" },
    { game: "Degen Dash",       view: "getTopPoints",   address: GAMES.degendash.contract, args: [],     weight: 1, c: "#FFD23F", route: "/degen-dash" },
    { game: "Clawback",         view: "getTopPoints",   address: GAMES.clawback.contract,  args: [],     weight: 1, c: "#FF6B9D", route: "/clawback" },
    { game: "The Button",       view: "getTopPoints",   address: GAMES.button.contract,    args: [],     weight: 1, c: "#5B8DEF", route: "/button" },
  ].filter((s) => s.address && !/^erd1qqqqqqqqqqqqqqqqqqqqqqqqqqqq/.test(s.address));

  const client = createArcadeClient("canvas"); // throwaway query/decode client
  // bare /me = your passport; /me?addr=erd1... = a shareable read-only profile of any player
  const qAddr = new URLSearchParams(location.search).get("addr");
  const isSelf = !qAddr;
  const myAddr = qAddr || getAddress();
  let myHandle = isSelf ? getHandle() : null; // a shared profile picks up the name from the boards
  const view = document.getElementById("meView");
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const fmt = (n) => Number(n).toLocaleString("en-US");
  const short = (a) => (a ? a.slice(0, 8) + "…" + a.slice(-4) : "");
  // decodeLeaderboard returns bech32 only if the crypto libs are loaded (they are not on a
  // read-only profile), else 32-byte pubkey hex. Match in BOTH formats, no key grinding.
  const addrToHex = (a) => { try { if (!a) return ""; const w = bech32.decode(a, 256).words; return Array.from(bech32.fromWords(w)).map((b) => b.toString(16).padStart(2, "0")).join(""); } catch (e) { return ""; } };
  const myHex = addrToHex(myAddr);

  // deterministic 5x5 mirrored identicon from the address
  function identicon(seed) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
    const rng = () => ((h = (Math.imul(h, 1664525) + 1013904223) >>> 0) / 4294967296);
    let cells = "";
    for (let y = 0; y < 5; y++) { const a = rng() > 0.5, b = rng() > 0.5, c = rng() > 0.5; [a, b, c, b, a].forEach((on) => { cells += `<i class="${on ? "on" : ""}"></i>`; }); }
    return cells;
  }

  async function readSrc(s) {
    try {
      const rd = await client.query(s.view, s.args, s.address);
      return rd && rd.length ? client.decodeLeaderboard(rd) : [];
    } catch (e) { return []; }
  }

  function noPassport() {
    view.innerHTML = `<div class="me-empty">
      <div class="t">No passport yet</div>
      <div class="s">Your passport is created the first time you tap. Play any game, and your points start stacking up here.</div>
      <div class="cta-row"><a class="cta primary" href="/">Play the arcade</a></div></div>`;
  }

  async function load() {
    if (!myAddr || (isSelf && !hasPassport())) { noPassport(); return; }
    const results = await Promise.all(SRC.map((s) => readSrc(s).then((es) => ({ s, es }))));

    const totals = new Map(); // address -> points (full board, for rank)
    const mine = []; // per-game { ...s, pts }
    let myTotal = 0;
    for (const { s, es } of results) {
      let myPts = 0;
      for (const e of es) {
        if (!e || !e.address || !e.score) continue;
        const pts = Math.round(e.score * s.weight);
        totals.set(e.address, (totals.get(e.address) || 0) + pts);
        const ea = String(e.address).toLowerCase();
        if (ea === myAddr.toLowerCase() || (myHex && ea === myHex)) { myPts = pts; if (!myHandle && e.handle) myHandle = e.handle; }
      }
      mine.push({ ...s, pts: myPts });
      myTotal += myPts;
    }
    const players = totals.size;
    const myRank = myTotal > 0 ? [...totals.values()].filter((t) => t > myTotal).length + 1 : null;

    const name = myHandle && myHandle.length ? esc(myHandle) : "Player";
    const addrLine = (myHandle && myHandle.length) || !isSelf
      ? short(myAddr)
      : `${short(myAddr)} · <span class="set">add a name on any game's board</span>`;

    const rcls = myRank && myRank <= 3 ? " r" + myRank : "";
    const rankBlock = myRank
      ? `<div class="pb-rank${rcls}"><div class="medal">#${myRank}</div><div class="of">of ${fmt(players)}<br/>player${players === 1 ? "" : "s"}</div></div>`
      : `<div class="pb-rank none"><div class="medal">&middot;</div><div class="of">play to<br/>get ranked</div></div>`;

    const games = mine.map((g) => {
      const z = g.pts > 0 ? "" : " zero";
      return `<a class="pg${z}" style="--gc:${g.c}" href="${g.route}">`
        + `<span class="go" aria-hidden="true">&rarr;</span>`
        + `<div class="gnm">${esc(g.game)}</div>`
        + `<div class="gv"><span class="n">${g.pts > 0 ? fmt(g.pts) : "0"}</span><span class="u">pts</span></div></a>`;
    }).join("");

    view.innerHTML = `
      <div class="passport">
        <span class="pb-brk tl"></span><span class="pb-brk tr"></span><span class="pb-brk bl"></span><span class="pb-brk br"></span>
        <div class="pb-marq"><span class="strip"></span>Player Passport</div>
        <div class="pb-id">
          <div class="pb-ico" aria-hidden="true">${identicon(myAddr)}</div>
          <div class="pb-idt"><h1 class="pb-name">${name}</h1><div class="pb-addr">${addrLine}</div></div>
        </div>
        <div class="pb-stat">
          <div class="pb-total"><div class="lbl">Arcade points</div><div class="v">${fmt(myTotal)}</div></div>
          ${rankBlock}
        </div>
      </div>
      ${myTotal > 0 ? `<button id="meShareBtn" style="width:100%;max-width:340px;margin:16px auto 2px;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(35,247,221,.1);color:#23F7DD;border:1px solid rgba(35,247,221,.35);border-radius:12px;padding:13px 18px;font:600 13px/1 'JetBrains Mono',ui-monospace,monospace;letter-spacing:.08em;text-transform:uppercase;cursor:pointer"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M16 6l-4-4-4 4M12 2v13"/></svg>Share my passport</button>` : ""}
      <p class="pg-h">Points by game</p>
      <div class="pg-grid">${games}</div>`;
    { const _msb = document.getElementById("meShareBtn"); if (_msb) _msb.addEventListener("click", () => window.shareScore && window.shareScore({ game: "me", score: myTotal, rank: myRank })); }
    if (galaxy) { try { for (let i = 0; i < 6; i++) galaxy.pulse(i % 3, 1); } catch (e) {} }
  }

  load();
</script>
<p style="position:relative;z-index:3;margin:22px auto 16px;text-align:center;font-family:&#39;JetBrains Mono&#39;,ui-monospace,monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#6B7385;line-height:1.6;">Built with &#10084;&#65039; on MultiversX &middot; <a href="https://github.com/lamentierschweinchen/supernova-arcade" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;text-underline-offset:2px;">GitHub</a> &middot; <a href="https://github.com/lamentierschweinchen/supernova-arcade/issues/new?template=bug-report.yml" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;text-underline-offset:2px;">Report a bug</a></p>
<script type="module" src="/arcade-share.js"></script></body>
</html>
